<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages</title>
<style>
body { font-family:'Segoe UI',sans-serif; background:#eef2f7; margin:0; padding:0; }
.container { max-width:900px; margin:50px auto; background:#fff; padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.08);}
h1 { color:#1e3a8a; text-align:center; }
.message { background:#f8fafc; padding:15px; border-radius:10px; margin:15px 0; }
.message strong { color:#2563eb; }
.back-btn { display:block; margin:20px auto; padding:10px 20px; background:#2563eb; color:#fff; border:none; border-radius:8px; cursor:pointer; }
.back-btn:hover { background:#1e40af; }
</style>
</head>
<body>

<div class="container">
    <h1>Your Messages</h1>
    <div id="messagesList"></div>
    <button class="back-btn" onclick="window.location.href='profile.html'">Back to Profile</button>
</div>

<script>
// Sample messages for testing
if(!localStorage.getItem('messages')){
    localStorage.setItem('messages', JSON.stringify([
        {to:"john@example.com", from:"alice@example.com", msg:"Is this your laptop?"},
        {to:"john@example.com", from:"bob@example.com", msg:"I found your backpack."},
        {to:"jane@example.com", from:"john@example.com", msg:"Hi Jane!"}
    ]));
}

// get logged-in student
const studentData = JSON.parse(localStorage.getItem('studentData'));
if(!studentData){
    window.location.href = "login.html";
}

// display messages
const allMessages = JSON.parse(localStorage.getItem('messages')) || [];
const myMessages = allMessages.filter(m => m.to === studentData.email);

const messagesList = document.getElementById("messagesList");

if(myMessages.length === 0){
    messagesList.innerHTML = "<p>You have no messages.</p>";
} else {
    myMessages.forEach(m => {
        const div = document.createElement("div");
        div.className = "message";
        div.innerHTML = `<strong>From: ${m.from}</strong><br>${m.msg}`;
        messagesList.appendChild(div);
    });
}
</script>

</body>
</html>
